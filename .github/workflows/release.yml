name: Release

on:
  push:
    branches:
      - main
      - master

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: true  # Required for pushing tags to the repository
          fetch-depth: 2

      - name: Get uv version from constraints
        id: uv-version
        shell: pwsh
        run: |
          $UV_VERSION = (Get-Content .github/workflows/constraints.txt | Where-Object { $_ -match '^uv==' } | ForEach-Object { ($_ -split '==')[1] })
          echo "version=$UV_VERSION" >> $env:GITHUB_OUTPUT

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          version: ${{ steps.uv-version.outputs.version }}
          python-version: "3.13"

      - name: Check if there is a parent commit
        id: check-parent-commit
        shell: bash
        run: |
          set -euo pipefail

          if git rev-parse --verify --quiet HEAD^ >/dev/null; then
            echo "has-parent=true" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse --verify HEAD^)" >> "$GITHUB_OUTPUT"
            echo "Parent commit detected: true"
          else
            echo "has-parent=false" >> "$GITHUB_OUTPUT"
            echo "sha=" >> "$GITHUB_OUTPUT"
            echo "Parent commit detected: false"
          fi

      - name: Detect and tag new version
        id: check-version
        if: steps.check-parent-commit.outputs.has-parent == 'true'
        shell: bash
        run: |
          set -euo pipefail

          read_version_from_file() {
            python - "$1" <<'PY'
          import sys
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path(sys.argv[1]).read_text())
          version = (
              data.get("project", {}).get("version")
              or data.get("tool", {}).get("poetry", {}).get("version")
          )

          if not version:
              raise SystemExit("Could not find version in [project] or [tool.poetry]")

          print(version)
          PY
          }

          PREVIOUS_VERSION="$(read_version_from_file <(git show HEAD~1:pyproject.toml))"
          CURRENT_VERSION="$(read_version_from_file pyproject.toml)"

          echo "Previous version: $PREVIOUS_VERSION"
          echo "Current version: $CURRENT_VERSION"

          echo "previous-version=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"
          echo "current-version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT_VERSION" = "$PREVIOUS_VERSION" ]; then
            echo "Version has not changed; nothing to tag."
            exit 0
          fi

          TAG="v$CURRENT_VERSION"

          git fetch --tags

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Creating tag $TAG"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" -m "Released version $CURRENT_VERSION"
          git push origin "$TAG"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Bump version for developmental release
        if: (!steps.check-version.outputs.tag)
        run: |
          uv version --bump patch --frozen &&
          version=$(uv version --short) &&
          uv version $version.dev.$(date +%s) --no-sync

      - name: Build package
        run: |
          uv build

      - name: Publish package on PyPI
        if: steps.check-version.outputs.tag
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  #v1.14.0

      - name: Publish package on TestPyPI
        if: (!steps.check-version.outputs.tag)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  #v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish the release notes
        uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927  #v7.3.0
        with:
          publish: ${{ steps.check-version.outputs.tag != '' }}
          tag: ${{ steps.check-version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
